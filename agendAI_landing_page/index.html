              content="barbearia, agenda, agendamento, whatsapp, agente, automação, IA, chatbot, barbearias, lembrete, confirmação, clientes, marketing, agendamento online" />
        <script>
          (function () {
            const search = window.location.search;
            if (!search || search.length < 2 || search[1] !== "/") return;

            const decoded = search
              .slice(1)
              .split("&")
              .map(function (s) {
                return s.replace(/~and~/g, "&");
              })
              .join("?");

            window.history.replaceState(
              null,
              "",
              window.location.pathname.slice(0, -1) + decoded + window.location.hash
            );
          })();
        </script>
